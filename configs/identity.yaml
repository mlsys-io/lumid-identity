app:
  port: 9900
  mode: debug
  issuer: https://lum.id

mysql:
  # Inside Docker, override MYSQL_HOST=host.docker.internal so we hit
  # the trading_mysql container via the host gateway.
  host: "${MYSQL_HOST}"
  port: 3306
  user: root
  password: "${MYSQL_ROOT_PASSWORD}"
  database: lumid_identity

redis:
  addr: "${REDIS_ADDR}"
  password: "${REDIS_PASSWORD}"
  db: 3   # db 0 is LQA, 1-2 reserved, 3 for identity

signing:
  # Each .pem here = one RS256 keypair. Filename (sans ext) = kid.
  # Losing this dir invalidates every issued JWT — the Docker compose
  # persists it at /var/lib/lumid-identity/signing-keys on the host.
  key_dir: "${SIGNING_KEY_DIR}"

jwt:
  access_ttl_sec: 86400      # 24h — dashboards expect a working-day session
  refresh_ttl_sec: 2592000   # 30 days

oauth:
  google:
    client_id: "${GOOGLE_CLIENT_ID}"
    client_secret: "${GOOGLE_CLIENT_SECRET}"
    redirect_uri: https://lum.id/auth/callback
  github:
    client_id: "${GITHUB_CLIENT_ID}"
    client_secret: "${GITHUB_CLIENT_SECRET}"
    redirect_uri: https://lum.id/auth/callback

legacy:
  # Shadow mode: read from QuantArena MySQL so we can mirror its
  # introspect responses without migrating data. Set false after Phase 3.
  enabled: true
  dsn: "root:${MYSQL_ROOT_PASSWORD}@tcp(${MYSQL_HOST}:3306)/trading_community?parseTime=true&charset=utf8mb4"
