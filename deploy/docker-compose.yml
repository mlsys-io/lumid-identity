services:
  lumid-identity:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: lumid-identity:latest
    container_name: lumid-identity
    restart: unless-stopped
    ports:
      - "9900:9900"
    environment:
      MYSQL_HOST: host.docker.internal
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD required}
      REDIS_ADDR: host.docker.internal:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      SIGNING_KEY_DIR: /app/configs/signing-keys
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      # Persist the signing keys across rebuilds — losing them means
      # every issued JWT stops verifying.
      - /var/lib/lumid-identity/signing-keys:/app/configs/signing-keys
    extra_hosts:
      # Hit the existing trading_mysql + redis on the host network
      # rather than joining their compose project. Decouples lifecycle.
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
